<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Digital - RAD Imagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div id="main-content-display"></div>
        <div id="agenda-slideshow"></div>

        <div id="widget-info">
            <div id="clock">00:00</div>
            <div id="date">...</div>
            <hr style="margin: 10px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.2);">
            <div id="weather-row">
                <span id="txt-clima">--°C</span>
                <small id="txt-desc">Timon-MA</small>
            </div>
        </div>

        <div id="widget-footer">
            <div class="ticker-wrap">
                <div class="ticker" id="txt-noticia">Iniciando sistema informativo RAD Imagem...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALeKvd6zzl7VE67ygb7YPw5WjCO6sRP14",
            authDomain: "painel-8c72a.firebaseapp.com",
            databaseURL: "https://painel-8c72a-default-rtdb.firebaseio.com/",
            projectId: "painel-8c72a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- RELÓGIO ---
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = h + ":" + m;
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- CLIMA ---
        async function getClima() {
            try {
                const res = await fetch("https://api.openweathermap.org/data/2.5/weather?lat=-5.0939&lon=-42.8416&appid=86ecce68dfacb31e2e21fe5c621a2317&units=metric&lang=pt_br");
                const data = await res.json();
                if (data.main) {
                    document.getElementById('txt-clima').innerText = Math.round(data.main.temp) + "°C";
                    document.getElementById('txt-desc').innerText = data.weather[0].description;
                }
            } catch (e) { console.error("Erro clima:", e); }
        }
        setInterval(getClima, 900000); getClima();

        // --- AGENDA (GOOGLE DRIVE / LOCAL) ---
        let fotosAgenda = [];
        let indice = 0;

        function formatImgUrl(url) {
            if (!url) return '';
            url = url.trim();
            // Se for Google Drive, converte para miniatura HD (sz=w1200)
            const driveMatch = url.match(/(?:id=|\/d\/|d\/)([\w-]{25,})/);
            if (driveMatch && driveMatch[1]) {
                return "https://drive.google.com/thumbnail?id=" + driveMatch[1] + "&sz=w1200";
            }
            // Se não for link (ex: "foto1.jpg"), ele busca na pasta local
            return url;
        }

        function rodarAgenda() {
            const container = document.getElementById('agenda-slideshow');
            if (fotosAgenda.length > 0) {
                if (indice >= fotosAgenda.length) indice = 0;
                const urlFinal = formatImgUrl(fotosAgenda[indice]);
                
                const img = new Image();
                img.src = urlFinal;
                img.className = 'fade-in responsive-img';
                img.onload = () => {
                    container.innerHTML = '';
                    container.appendChild(img);
                };
                indice = (indice + 1) % fotosAgenda.length;
            }
        }
        setInterval(rodarAgenda, 10000);

        // --- FIREBASE ---
        onValue(ref(db, 'layout_painel'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('txt-noticia').innerText = data.noticia || "";
            if (data.clima) document.getElementById('txt-clima').innerText = data.clima;

            // Atualiza Lista da Agenda
            if (data.agendaUrls) {
                fotosAgenda = data.agendaUrls.split(',').map(u => u.trim()).filter(u => u.length > 2);
                if (indice === 0) rodarAgenda();
            }

            const display = document.getElementById('main-content-display');
            const type = data.mainContentType;
            const url = data.mainContentUrl;
            
            display.innerHTML = "";
            if (type === 'file_video') {
                display.innerHTML = `<video src="${url}" autoplay loop playsinline></video>`;
            } else if (type === 'youtube_video') {
                // MUTE=0 para habilitar o som (Exige clique na tela ao carregar)
                display.innerHTML = `<iframe src="https://www.youtube.com/embed/${url}?autoplay=1&mute=0&playlist=${url}&loop=1&controls=0" allow="autoplay; fullscreen"></iframe>`;
            }
        });
    </script>
</body>
</html>
