<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Digital - RAD Imagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- LADO ESQUERDO: VÍDEO -->
        <div id="main-content-display"></div>

        <!-- LADO DIREITO: AGENDA -->
        <div id="agenda-slideshow"></div>

        <!-- WIDGET DE HORA E CLIMA -->
        <div id="widget-info">
            <div id="clock">00:00</div>
            <div id="date">Carregando data...</div>
            <hr style="margin: 10px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.2);">
            <div id="weather-row">
                <span id="txt-clima">--°C</span>
                <small id="txt-desc">Timon-MA</small>
            </div>
        </div>

        <!-- RODAPÉ -->
        <div id="widget-footer">
            <div class="ticker-wrap">
                <div class="ticker" id="txt-noticia">Iniciando sistema informativo...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALeKvd6zzl7VE67ygb7YPw5WjCO6sRP14",
            authDomain: "painel-8c72a.firebaseapp.com",
            databaseURL: "https://painel-8c72a-default-rtdb.firebaseio.com/",
            projectId: "painel-8c72a"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LÓGICA DO RELÓGIO ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}`;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('pt-BR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- LÓGICA DO CLIMA AUTOMÁTICO ---
        const weatherKey = "86ecce68dfacb31e2e21fe5c621a2317";
        async function getClima() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=-5.0939&lon=-42.8416&appid=${weatherKey}&units=metric&lang=pt_br`);
                const data = await res.json();
                if (data.main) {
                    document.getElementById('txt-clima').innerText = Math.round(data.main.temp) + "°C";
                    document.getElementById('txt-desc').innerText = data.weather[0].description;
                }
            } catch (e) { console.error("Erro clima", e); }
        }
        setInterval(getClima, 900000); // 15 min
        getClima();

        // --- LÓGICA DA AGENDA (GOOGLE DRIVE) ---
        let fotosAgenda = [];
        let indice = 0;
        function formatDriveUrl(url) {
            const id = url.match(/\/d\/(.+?)\//);
            return id ? `https://lh3.googleusercontent.com/d/${id[1]}` : url.trim();
        }
        function rodarAgenda() {
            const container = document.getElementById('agenda-slideshow');
            if (fotosAgenda.length > 0) {
                container.innerHTML = `<img src="${formatDriveUrl(fotosAgenda[indice])}" class="fade-in">`;
                indice = (indice + 1) % fotosAgenda.length;
            }
        }
        setInterval(rodarAgenda, 10000);

        // --- ESCUTAR FIREBASE ---
        onValue(ref(db, 'layout_painel'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('txt-noticia').innerText = data.noticia || "";
            
            // Se houver clima manual no admin, ele substitui o automático
            if (data.clima && data.clima.trim() !== "") {
                document.getElementById('txt-clima').innerText = data.clima;
                document.getElementById('txt-desc').innerText = "Manual";
            }

            if (data.agendaUrls) {
                fotosAgenda = data.agendaUrls.split(',');
                rodarAgenda();
            }

            const display = document.getElementById('main-content-display');
            const type = data.mainContentType;
            const url = data.mainContentUrl;
            display.innerHTML = ""; 

            if (type === 'file_video') {
                display.innerHTML = `<video src="${url}" autoplay muted loop playsinline></video>`;
            } else if (type === 'youtube_video') {
                display.innerHTML = `<iframe src="https://www.youtube.com/embed/${url}?autoplay=1&mute=1&loop=1&playlist=${url}&controls=0"></iframe>`;
            } else {
                display.innerHTML = `<img src="${url}" style="object-fit: cover;">`;
            }
        });
    </script>
</body>
</html>
