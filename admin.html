<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - RAD Imagem</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #e5e7eb; }
        .card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2563eb; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #1d4ed8; }
        #admin-box { display: none; }
        h2 { text-align: center; color: #1f2937; margin-bottom: 20px; }
        label { font-size: 13px; font-weight: bold; color: #4b5563; display: block; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2>Acesso Restrito</h2>
        <input type="email" id="email" placeholder="E-mail do Firebase">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar no Painel</button>
    </div>

    <div id="admin-box" class="card">
        <h2>Controle RAD Imagem</h2>
        <button onclick="fazerLogout()" style="background:#666;">Sair</button>

        <label>ID do Vídeo YouTube (Ex: dQw4w9WgXcQ):</label>
        <input type="text" id="yt-id" placeholder="Deixe vazio se for usar arquivo .mp4">
        
        <label>Link Direto .mp4 (Cloudinary ou servidor):</label>
        <input type="text" id="vid-url">

        <label>Fotos da Agenda (Links do Drive ou nomes de arquivos locais, separe por vírgula):</label>
        <textarea id="agenda-links" rows="5" placeholder="link1, link2, foto-local.jpg"></textarea>

        <label>Notícia do Rodapé:</label>
        <input type="text" id="noticia">

        <label>Clima Manual (Opcional):</label>
        <input type="text" id="clima">

        <button onclick="salvar()" style="background:#059669; margin-top: 25px; font-size: 18px;">🚀 ATUALIZAR PAINEL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALeKvd6zzl7VE67ygb7YPw5WjCO6sRP14",
            authDomain: "painel-8c72a.firebaseapp.com",
            databaseURL: "https://painel-8c72a-default-rtdb.firebaseio.com/",
            projectId: "painel-8c72a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        window.fazerLogin = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro: " + err.message));
        }

        window.fazerLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-box').style.display = user ? 'none' : 'block';
            document.getElementById('admin-box').style.display = user ? 'block' : 'none';
        });

        window.salvar = () => {
            const yt = document.getElementById('yt-id').value;
            const vid = document.getElementById('vid-url').value;
            let tipo = 'file_video';
            let url = vid;

            if (yt) { tipo = 'youtube_video'; url = yt; }

            const dados = {
                noticia: document.getElementById('noticia').value,
                clima: document.getElementById('clima').value,
                agendaUrls: document.getElementById('agenda-links').value,
                mainContentType: tipo,
                mainContentUrl: url
            };

            update(ref(db, 'layout_painel'), dados).then(() => alert("Atualizado!")).catch(e => alert(e.message));
        }
    </script>
</body>
</html>
