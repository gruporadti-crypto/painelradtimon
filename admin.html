<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Controle Total</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #e5e7eb; }
        .admin-card { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1f2937; text-align: center; }
        h3 { color: #374151; margin-top: 20px; border-bottom: 1px solid #e5e7eb; padding-bottom: 5px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #4b5563; font-size: 14px; }
        input[type="text"], textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 10px 15px; margin-top: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .full-width-button { width: 100%; padding: 15px; font-size: 16px; margin-top: 25px; background: #059669; }
        .status { font-size: 0.8em; color: #059669; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h2>Painel de Controle</h2>
        
        <h3>1. Lado Esquerdo (Vídeo/Principal)</h3>
        <label>YouTube (Link do vídeo ou live):</label>
        <input type="text" id="in-youtube-url" placeholder="https://www.youtube.com/watch?v=...">
        <button onclick="setYouTubeContent()">Selecionar YouTube</button>
        <p id="youtube-status" class="status"></p>

        <label>Link Direto (.mp4) ou Cloudinary:</label>
        <input type="text" id="in-video-url" placeholder="https://...">
        <button onclick="setDirectContent('file_video')">Selecionar Vídeo</button>
        <p id="video-status" class="status"></p>

        <h3>2. Lado Direito (Agenda Semanal)</h3>
        <label>Links das Fotos do Drive (Cole todos separados por vírgula):</label>
        <textarea id="in-agenda" rows="4" placeholder="Link1, Link2, Link3..."></textarea>
        <p style="font-size: 11px; color: #666;">Dica: Pegue o link de compartilhar no Drive e cole aqui.</p>

        <hr>
        <h3>3. Textos</h3>
        <label>Notícia do Rodapé:</label>
        <input type="text" id="in-noticia" placeholder="Digite a notícia...">

        <label>Temperatura Manual (Opcional):</label>
        <input type="text" id="in-clima" placeholder="Ex: 30°C Ensolarado">

        <button onclick="atualizar()" class="full-width-button">🚀 ENVIAR PARA O PAINEL</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
    import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALeKvd6zzl7VE67ygb7YPw5WjCO6sRP14",
        authDomain: "painel-8c72a.firebaseapp.com",
        databaseURL: "https://painel-8c72a-default-rtdb.firebaseio.com/",
        projectId: "painel-8c72a"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentContentType = 'file_video'; 
    let currentContentUrl = '';

    window.setDirectContent = (type) => {
        currentContentType = type;
        currentContentUrl = document.getElementById('in-video-url').value;
        document.getElementById('video-status').innerText = "✅ Vídeo selecionado!";
    };

    window.setYouTubeContent = () => {
        let url = document.getElementById('in-youtube-url').value;
        let id = "";
        if(url.includes("v=")) id = url.split("v=")[1].split("&")[0];
        else if(url.includes("youtu.be/")) id = url.split("youtu.be/")[1];
        
        if(id) {
            currentContentType = 'youtube_video';
            currentContentUrl = id;
            document.getElementById('youtube-status').innerText = "✅ YouTube selecionado!";
        } else { alert("Link do YouTube inválido!"); }
    };

    window.atualizar = () => {
        const payload = {
            noticia: document.getElementById('in-noticia').value,
            clima: document.getElementById('in-clima').value,
            agendaUrls: document.getElementById('in-agenda').value,
            mainContentType: currentContentType,
            mainContentUrl: currentContentUrl
        };

        update(ref(db, 'layout_painel'), payload)
          .then(() => alert('Painel atualizado com sucesso!'))
          .catch((err) => alert('Erro: ' + err.message));
    };
</script>
</body>
</html>
